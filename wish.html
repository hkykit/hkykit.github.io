<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Make a Wish to Bobo! ⭐</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="floaties" id="floaties"></div>

<div class="container">
  <a href="index.html" class="back-link">← Back to Bobo's World</a>

  <h1 class="page-title">Make a Wish to Bobo! ⭐</h1>
  <p class="page-sub">Got something sweet to say? Bobo is listening with all her heart~ 🐼💚</p>

  <div class="wish-wrap">
    <div class="chat-box">
      <div class="chat-msgs" id="chat-msgs"></div>
      <textarea
        class="wish-input"
        id="wish-input"
        placeholder="Type your sweetest wish for Bobo here... 💚&#10;(Press Enter to send, Shift+Enter for new line)"
        rows="4"
      ></textarea>
      <button class="send-btn" id="send-btn">Send Wish 💌</button>
    </div>
    <p class="wish-tip">Every wish makes Bobo's heart a little warmer~ 🐼💚</p>
  </div>
</div>

<script>
  const BOT_TOKEN = '8867963737:AAGm1fh4ZWh3d2Djy1Rk1uQ4JpVC-yHNQsA';
  const CHAT_ID   = '5693906587';

  function addBubble(text, sent) {
    const msgs = document.getElementById('chat-msgs');
    const b = document.createElement('div');
    b.className = 'bubble' + (sent ? ' sent' : '');
    b.textContent = text;
    msgs.appendChild(b);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function sendToTelegram(msg) {
    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chat_id: CHAT_ID, text: '💌 A wish from My Bobo:\n\n' + msg })
    }).catch(() => {});
  }

  document.addEventListener('DOMContentLoaded', () => {
    addBubble("Hey My Bobo~ 🍟✨ Welcome to Bobo's wishing corner!", false);
    setTimeout(() => addBubble("What's your sweetest wish for Bobo today? 🐼💚 She's all ears, all heart, and all yours~ 🌿", false), 800);

    const btn  = document.getElementById('send-btn');
    const area = document.getElementById('wish-input');

    function send() {
      const text = area.value.trim();
      if (!text) return;

      addBubble(text, true);
      area.value = '';
      sendToTelegram(text);

      setTimeout(() => addBubble("💚 Bobo received your wish! She's smiling and blushing right now~ 🥰🐼✨", false), 600);
    }

    btn.addEventListener('click', send);
    area.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });
  });

  // floating bg
  const FLOATIES = ['⭐','💚','🌿','✨','🌸','💫','🍀','💌'];
  const el = document.getElementById('floaties');
  for (let i = 0; i < 14; i++) {
    const s = document.createElement('span');
    s.className = 'floaty';
    s.textContent = FLOATIES[Math.floor(Math.random() * FLOATIES.length)];
    s.style.left = Math.random() * 100 + 'vw';
    s.style.animationDuration = (12 + Math.random() * 14) + 's';
    s.style.animationDelay = (Math.random() * 16) + 's';
    s.style.fontSize = (.9 + Math.random() * .8) + 'rem';
    el.appendChild(s);
  }
</script>
</body>
</html>
