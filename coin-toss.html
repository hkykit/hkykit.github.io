<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coin Toss 🪙</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .coin-wrap {
      max-width: 480px;
      margin: 0 auto;
      text-align: center;
    }

    /* ── 3-D stage ── */
    .coin-stage {
      perspective: 900px;
      display: flex;
      justify-content: center;
      margin: 2.5rem 0 2rem;
    }

    .coin {
      width: 200px; height: 200px;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 1.5s cubic-bezier(.33,.01,.2,1);
      cursor: pointer;
    }

    /* ── Edge (visible mid-spin) ── */
    .coin-edge {
      position: absolute;
      width: 100%; height: 100%;
      border-radius: 50%;
      background: conic-gradient(#aaa, #777, #ccc, #888, #bbb, #666, #aaa);
      transform: rotateY(90deg) scaleX(.06);
      backface-visibility: visible;
    }

    /* ── Shared face ── */
    .coin-face {
      position: absolute; inset: 0;
      border-radius: 50%;
      backface-visibility: hidden;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      overflow: hidden;
    }

    /* inner raised ring */
    .coin-face::before {
      content: '';
      position: absolute; inset: 10px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,.35);
      pointer-events: none; z-index: 2;
    }

    /* gloss overlay */
    .coin-face::after {
      content: '';
      position: absolute; inset: 0;
      border-radius: 50%;
      background: radial-gradient(ellipse at 35% 28%, rgba(255,255,255,.45) 0%, transparent 55%);
      pointer-events: none; z-index: 3;
    }

    /* ── WPB — gold ── */
    .coin-heads {
      background:
        radial-gradient(circle at 32% 28%, rgba(255,252,200,.7) 0%, transparent 45%),
        linear-gradient(145deg, #ffe066 0%, #d4a017 35%, #f0c040 55%, #a07000 80%, #ddb84a 100%);
      box-shadow:
        inset 0 0 0 7px rgba(255,220,80,.3),
        inset 0 0 0 8px rgba(0,0,0,.15),
        0 16px 48px rgba(180,120,0,.35),
        0 4px 12px rgba(0,0,0,.25);
    }

    /* ── GPS — orange ── */
    .coin-tails {
      background:
        radial-gradient(circle at 32% 28%, rgba(255,220,140,.6) 0%, transparent 45%),
        linear-gradient(145deg, #ffb347 0%, #e06000 35%, #ff9020 55%, #b84000 80%, #ff8030 100%);
      box-shadow:
        inset 0 0 0 7px rgba(255,160,60,.25),
        inset 0 0 0 8px rgba(0,0,0,.15),
        0 16px 48px rgba(180,80,0,.35),
        0 4px 12px rgba(0,0,0,.25);
      transform: rotateY(180deg);
    }

    /* ── Coin text ── */
    .coin-name {
      font-family: 'Nunito', sans-serif;
      font-size: 1.45rem;
      font-weight: 900;
      letter-spacing: 8px;
      text-transform: uppercase;
      position: relative; z-index: 4;
    }
    .coin-heads .coin-name {
      color: #5c3600;
      text-shadow:
        0 1px 0 rgba(255,230,100,.9),
        0 -1px 0 rgba(0,0,0,.25),
        0 0 12px rgba(255,200,0,.3);
    }
    .coin-tails .coin-name {
      color: #3e1400;
      text-shadow:
        0 1px 0 rgba(255,180,80,.9),
        0 -1px 0 rgba(0,0,0,.25),
        0 0 12px rgba(255,120,0,.3);
    }

    /* ── Flip button ── */
    .flip-btn {
      background: var(--g700); color: #fff; border: none;
      border-radius: 50px; padding: .9rem 3rem;
      font-family: 'Nunito', sans-serif;
      font-size: 1.05rem; font-weight: 800;
      cursor: pointer; transition: background .2s, transform .15s, box-shadow .2s;
      box-shadow: 0 4px 16px rgba(45,106,79,.3);
      margin-bottom: 1.8rem;
    }
    .flip-btn:hover  { background: var(--g800); transform: scale(1.05); box-shadow: 0 8px 24px rgba(45,106,79,.4); }
    .flip-btn:active { transform: scale(.97); }
    .flip-btn:disabled { background: var(--g300); cursor: not-allowed; transform: none; box-shadow: none; }

    /* ── Result ── */
    .result-box {
      background: var(--white);
      border-radius: var(--radius);
      padding: 1.6rem 2rem;
      box-shadow: var(--shadow);
      min-height: 80px;
      display: flex; align-items: center;
      justify-content: center; flex-direction: column;
      gap: .4rem;
      opacity: 0; transition: opacity .45s ease;
    }
    .result-box.show { opacity: 1; }
    .result-label {
      font-family: 'Pacifico', cursive;
      font-size: 1.8rem;
    }
    .result-sub {
      font-size: .93rem; font-weight: 700;
      color: var(--g700); line-height: 1.5;
    }

    /* ── Tally ── */
    .tally {
      display: flex; gap: 1.5rem;
      justify-content: center; margin-top: 2rem;
    }
    .tally-item {
      background: var(--white);
      border-radius: var(--rsm);
      padding: .8rem 1.6rem;
      box-shadow: var(--shadow);
      text-align: center; min-width: 95px;
    }
    .tally-num {
      font-family: 'Pacifico', cursive;
      font-size: 2rem;
    }
    .tally-name {
      font-size: .75rem; font-weight: 800;
      text-transform: uppercase; letter-spacing: 1.5px;
      color: var(--g500); margin-top: .2rem;
    }
  </style>
</head>
<body>

<div class="floaties" id="floaties"></div>

<div class="container">
  <a href="index.html" class="back-link">← Back to My Space</a>

  <h1 class="page-title">Coin Toss 🪙</h1>
  <p class="page-sub">WPB or GPS? Give it a flip and let the universe decide~ ✨</p>

  <div class="coin-wrap">

    <!-- Coin -->
    <div class="coin-stage">
      <div class="coin" id="coin" onclick="flip()">
        <div class="coin-edge"></div>
        <div class="coin-face coin-heads">
          <span class="coin-name">WPB</span>
        </div>
        <div class="coin-face coin-tails">
          <span class="coin-name">GPS</span>
        </div>
      </div>
    </div>

    <!-- Button -->
    <button class="flip-btn" id="flip-btn" onclick="flip()">Flip! 🪙</button>

    <!-- Result -->
    <div class="result-box" id="result-box">
      <p class="result-sub">Click the coin or the button to flip~ 🌿</p>
    </div>

    <!-- Tally -->
    <div class="tally">
      <div class="tally-item">
        <div class="tally-num" id="heads-count" style="color:#b8860b">0</div>
        <div class="tally-name">✨ WPB</div>
      </div>
      <div class="tally-item">
        <div class="tally-num" id="tails-count" style="color:#e07000">0</div>
        <div class="tally-name">🟠 GPS</div>
      </div>
    </div>

  </div>
</div>

<script>
  const WPB_MSGS = [
    "✨ WPB it is! Golden wins this round~",
    "🌟 WPB! The golden side shines bright!",
    "💛 WPB! Pure gold, just like that~",
    "✨ WPB! Gleaming and glorious!",
    "🌟 WPB! The golden choice prevails~"
  ];
  const GPS_MSGS = [
    "🟠 GPS it is! Orange takes the crown~",
    "🔥 GPS! Bold and bright, orange wins!",
    "🟠 GPS! Warm and vivid, just like that~",
    "🔥 GPS! The orange side has spoken!",
    "🟠 GPS! Fiery and fierce, GPS wins~"
  ];

  let rotation = 0;
  let flipping = false;
  let wpb = 0, gps = 0;

  function flip() {
    if (flipping) return;
    flipping = true;

    const btn = document.getElementById('flip-btn');
    const result = document.getElementById('result-box');
    btn.disabled = true;
    result.classList.remove('show');

    const isHeads = Math.random() < 0.5;
    const spins = 5 + Math.floor(Math.random() * 4);
    const extra = isHeads ? 0 : 180;
    rotation += spins * 360 + extra;

    const coin = document.getElementById('coin');
    coin.style.transform = `rotateY(${rotation}deg)`;

    setTimeout(() => {
      if (isHeads) {
        wpb++;
        document.getElementById('heads-count').textContent = wpb;
        const msg = WPB_MSGS[Math.floor(Math.random() * WPB_MSGS.length)];
        result.innerHTML = `<p class="result-label" style="color:#b8860b">WPB! ✨</p><p class="result-sub">${msg}</p>`;
      } else {
        gps++;
        document.getElementById('tails-count').textContent = gps;
        const msg = GPS_MSGS[Math.floor(Math.random() * GPS_MSGS.length)];
        result.innerHTML = `<p class="result-label" style="color:#e07000">GPS! 🟠</p><p class="result-sub">${msg}</p>`;
      }
      result.classList.add('show');
      btn.disabled = false;
      flipping = false;
    }, 1350);
  }

  // floating bg
  const FLOATIES = ['🪙','✨','🌿','💫','⭐','🍀','🌸','💚'];
  const el = document.getElementById('floaties');
  for (let i = 0; i < 14; i++) {
    const s = document.createElement('span');
    s.className = 'floaty';
    s.textContent = FLOATIES[Math.floor(Math.random() * FLOATIES.length)];
    s.style.left = Math.random() * 100 + 'vw';
    s.style.animationDuration = (12 + Math.random() * 14) + 's';
    s.style.animationDelay = (Math.random() * 16) + 's';
    s.style.fontSize = (.9 + Math.random() * .8) + 'rem';
    el.appendChild(s);
  }
</script>
</body>
</html>
